<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paño LAPC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #1a1a1a; --card-bg: #224a2e; --text-color: #ffffff; --gold-accent: #d4af37; --input-bg: #2d2d2d; --jack-accent: #3a7bd5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background-color: var(--bg-color); color: var(--text-color); margin: 0; }
        h2 { text-align: center; color: var(--gold-accent); letter-spacing: 2px; margin-bottom: 5px; }
        
        /* 🛡️ ARRANQUE CIEGO: Todo oculto hasta que el servidor apruebe el DNI */
        #appPrincipal { display: none; }

        .btn-ranking-link { display: block; text-decoration: none; background: linear-gradient(90deg, #111, #224a2e, #111); border: 1px solid var(--gold-accent); border-radius: 8px; padding: 12px; margin-bottom: 20px; color: var(--gold-accent); text-transform: uppercase; font-weight: bold; text-align: center; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: all 0.2s ease; }
        .btn-ranking-link:active { transform: scale(0.98); background: var(--gold-accent); color: #111; }

        .section-card { background-color: var(--card-bg); border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #32613f; }
        .section-jack { border-color: var(--jack-accent); background-color: #1e2a3a; }
        h3 { border-bottom: 1px solid var(--gold-accent); padding-bottom: 8px; color: var(--gold-accent); margin-top: 0;}
        .section-jack h3 { color: var(--jack-accent); border-color: var(--jack-accent); }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 14px; color: #e0e0e0; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #444; background-color: var(--input-bg); color: white; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; min-height: 60px; }
        
        .player-row { background: #111; padding: 10px; border-radius: 8px; border: 1px solid #444; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; color: var(--gold-accent); cursor: pointer; }
        .checkbox-item input { width: 18px; height: 18px; margin: 0; }
        .matrix-toggles { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .toggle-btn { flex: 1; padding: 6px 2px; border-radius: 4px; border: 1px solid #555; font-size: 11px; font-weight: bold; cursor: pointer; background-color: #333; color: #888; transition: all 0.2s; margin-top: 0; }
        .toggle-btn.active { background-color: var(--gold-accent); color: #111; border-color: var(--gold-accent); }

        button.btn-main { width: 100%; padding: 15px; margin-top: 10px; background-color: var(--gold-accent); color: #111; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.btn-main:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        .btn-gasto { background-color: #32613f; color: white; margin-bottom: 15px; border: 1px dashed var(--gold-accent); width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; }
        .gasto-row { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px; }

        /* ESTILOS DEL RELOJ GIGANTE */
        #pantallaReloj { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:#050505; z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        #relojNivel { color:var(--gold-accent); font-size:28px; margin-bottom:15px; font-weight:900; letter-spacing: 2px; text-transform: uppercase; }
        #relojTiempo { color:white; font-size:110px; font-weight:bold; font-family:monospace; margin-bottom:40px; line-height: 1; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .btn-reloj { padding:20px 25px; font-size:16px; font-weight:bold; border:none; border-radius:8px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="appPrincipal">
        <h2>♠️ LAPC ♣️</h2> 
        <a href="ranking.html" class="btn-ranking-link">📊 ESTADÍSTICAS (LEADER, FORT Y FECHAS)</a>

        <button class="btn-main" style="background-color: #e63946; color: white; margin-bottom: 20px;" onclick="abrirReloj()">⏱️ ABRIR RELOJ LAPC</button>

        <div class="section-card">
            <h3>📅 Datos de la Jornada</h3>
            <label>Mes de la Fecha</label>
            <select id="mesFecha" onchange="detectarModoInteligente()"><option value="">⏳ Conectando al servidor...</option></select>
            
            <div id="areaFinanzas1">
                <label>Tipo de Torneo</label>
                <select id="tipoTorneo"><option value="Slam">Slam (Puntos 100%)</option><option value="GrandSlam">Grand Slam (Puntos 150%)</option></select>
                <label>Valor de la Entrada (Buy-in)</label>
                <input type="number" id="valorBuyIn" value="6000" style="font-weight: bold; color: var(--gold-accent);">
            </div>
        </div>

        <div id="areaFinanzas2">
            <div class="section-card">
                <h3>📍 Matriz de Asistencia y Consumos</h3>
                <div id="checkinArea">⏳ Cargando...</div>
            </div>

            <div class="section-card">
                <h3>💸 La Caja (Gastos)</h3>
                <div id="gastosContainer"></div>
                <button class="btn-gasto" onclick="agregarGasto()">➕ Agregar Gasto</button>
            </div>

            <div class="section-card"><h3>🏆 Torneo 1</h3><div id="torneo1"></div></div>
            <div class="section-card"><h3>🏆 Torneo 2</h3><div id="torneo2"></div></div>
        </div>

        <div class="section-card section-jack" id="areaJack">
            <h3>🎙️ Memorias de Jack Rivers</h3>
            <label>🏠 Sede / Lugar</label><input type="text" id="jackLugar" placeholder="Ej: Rifle House...">
            <label>🥩 El Menú</label><textarea id="jackComida" placeholder="Ej: Bondiola..." oninput="validarJack()"></textarea>
            <label>🍻 Hidratación</label><input type="text" id="jackBebida" placeholder="Ej: IPA y Fernet..." oninput="validarJack()"></textarea>
            <label>🃏 Manos Increíbles</label><textarea id="jackManos" placeholder="Ej: Daro color al As..." oninput="validarJack()"></textarea>
            <label>🔥 El Bardo</label><textarea id="jackBardo" placeholder="Ej: Bardo con las fichas..." oninput="validarJack()"></textarea>
        </div>
        
        <button id="btnLiquidar" class="btn-main" onclick="enviarDatos()">🚀 LIQUIDAR CAJA (DOMINGO)</button>
    </div>

    <div id="pantallaReloj">
        <div id="relojNivel">NIVEL 1</div>
        <div id="relojTiempo">12:00</div>
        
        <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; width:95%; max-width: 400px;">
            <button class="btn-reloj" id="btnPlayPause" style="background-color:#4CAF50; color:white; flex: 1 1 100%;" onclick="toggleReloj()">▶️ INICIAR RELOJ</button>
            <button class="btn-reloj" style="background-color:var(--gold-accent); color:#111; flex: 1;" onclick="siguienteNivel()">⏭️ SIG. NIVEL</button>
            <button class="btn-reloj" id="btnHeadsUp" style="background-color:#e63946; color:white; flex: 1;" onclick="modoHeadsUp()">⚔️ HEADS UP</button>
        </div>
        
        <button onclick="cerrarReloj()" style="margin-top:50px; padding:10px 20px; font-size:12px; background-color:#333; color:#aaa; border:1px solid #555; border-radius:8px; cursor: pointer;">🔙 VOLVER A LA CAJA</button>
    </div>

    <script>
        let tg;
        try { tg = window.Telegram.WebApp; tg.expand(); } catch(e) {}

        const googleWebhookUrl = "https://script.google.com/macros/s/AKfycbzaxfJJyLgAchlTBPrgM4GRfwSHmQyl3_UtU_FIi0Pt29ZjyLeW4uEfhLdopDBJkZAd/exec"; 
        const MI_TOKEN_SECRETO = "LAPC_2026_PRO_SECRET";
        
        let matrizJugadores = {}; 
        let todosLosJugadores = [];
        let gastoCount = 0;
        let historialFechas = []; 
        const anioActual = new Date().getFullYear(); 

        // --- LÓGICA DEL RELOJ TÁCTICO ---
        let tiempoRestante = 12 * 60; 
        let tiempoNivel = 12 * 60;
        let relojInterval = null;
        let relojCorriendo = false;
        let nivelActual = 1;
        let esHeadsUp = false;

        function calcularTiempoDinámico() {
            const presentes = Object.keys(matrizJugadores).filter(j => matrizJugadores[j].presente).length;
            if(presentes === 0) return 12; 
            return 8 + (presentes * 0.5); 
        }

        function abrirReloj() {
            document.getElementById('appPrincipal').style.display = 'none';
            document.getElementById('pantallaReloj').style.display = 'flex';
            
            if(!relojCorriendo && nivelActual === 1 && !esHeadsUp) {
                let mins = calcularTiempoDinámico();
                tiempoNivel = Math.floor(mins * 60);
                tiempoRestante = tiempoNivel;
                actualizarDisplayReloj();
            }
        }

        function cerrarReloj() {
            document.getElementById('pantallaReloj').style.display = 'none';
            document.getElementById('appPrincipal').style.display = 'block';
        }

        function actualizarDisplayReloj() {
            let m = Math.floor(tiempoRestante / 60);
            let s = Math.floor(tiempoRestante % 60);
            document.getElementById('relojTiempo').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleReloj() {
            const btn = document.getElementById('btnPlayPause');
            if(relojCorriendo) {
                clearInterval(relojInterval);
                relojCorriendo = false;
                btn.innerHTML = '▶️ CONTINUAR';
                btn.style.backgroundColor = '#4CAF50';
            } else {
                relojCorriendo = true;
                btn.innerHTML = '⏸️ PAUSA (ALL-IN)';
                btn.style.backgroundColor = '#e63946';
                relojInterval = setInterval(() => {
                    if(tiempoRestante > 0) {
                        tiempoRestante--;
                        actualizarDisplayReloj();
                    } else {
                        clearInterval(relojInterval);
                        relojCorriendo = false;
                        btn.innerHTML = '▶️ INICIAR SIGUIENTE';
                        btn.style.backgroundColor = '#4CAF50';
                        alert("⏰ ¡TIEMPO! SUBEN LAS CIEGAS.");
                        siguienteNivel();
                    }
                }, 1000);
            }
        }

        function siguienteNivel() {
            nivelActual++;
            document.getElementById('relojNivel').innerText = esHeadsUp ? `NIVEL ${nivelActual} (HEADS UP)` : `NIVEL ${nivelActual}`;
            tiempoRestante = tiempoNivel;
            actualizarDisplayReloj();
            if(relojCorriendo) { clearInterval(relojInterval); relojCorriendo = false; toggleReloj(); } 
        }

        function modoHeadsUp() {
            if(esHeadsUp) return;
            esHeadsUp = true;
            tiempoNivel = Math.floor(tiempoNivel / 2); 
            tiempoRestante = tiempoNivel;
            document.getElementById('btnHeadsUp').style.display = 'none';
            document.getElementById('relojNivel').innerText = `NIVEL ${nivelActual} (HEADS UP)`;
            document.getElementById('relojNivel').style.color = "#e63946";
            actualizarDisplayReloj();
        }

        // --- LÓGICA DE PADRÓN, SEGURIDAD CERO-CONFIANZA Y FINANZAS ---
        async function cargarPadron() {
            try {
                const uId = tg?.initDataUnsafe?.user?.id || "NADA";
                let response = await fetch(googleWebhookUrl + "?token=" + MI_TOKEN_SECRETO + "&uId=" + uId);
                let data = await response.json();
                
                if (data.error === "INTRUSO_RECHAZADO") {
                    document.body.innerHTML = `
                        <div style="text-align: center; margin-top: 50px;">
                            <h1 style="color: #ff4444; font-size: 60px; margin-bottom: 0;">⛔</h1>
                            <h2 style="color: #ff4444; font-family: monospace;">ACCESO DENEGADO</h2>
                            <p style="color: #888;">No figurás en la lista de Administradores.</p>
                        </div>`;
                    setTimeout(() => { if(tg) tg.close(); }, 3500);
                    return;
                }

                if (data.error) { alert("Error del servidor: " + data.error); return; }
                
                document.getElementById('appPrincipal').style.display = 'block';
                
                todosLosJugadores = data.jugadores || [];
                historialFechas = data.fechasJugadas || []; 
                renderizarTodosLosMeses();
                renderizarMatriz();
            } catch (error) {
                alert("Error de conexión. Intentá de nuevo.");
            }
        }

        function renderizarTodosLosMeses() {
            const selectMes = document.getElementById('mesFecha');
            selectMes.innerHTML = '<option value="">Seleccionar Mes...</option>';
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            meses.forEach(m => selectMes.innerHTML += `<option value="${m}">${m}</option>`);
        }

        function detectarModoInteligente() {
            const mes = document.getElementById('mesFecha').value;
            if (!mes) return;
            const yaJugado = historialFechas.includes(mes + "-" + anioActual);
            const btn = document.getElementById('btnLiquidar');
            
            if (yaJugado) {
                document.getElementById('areaFinanzas1').style.display = 'none';
                document.getElementById('areaFinanzas2').style.display = 'none';
                btn.innerText = "📰 PUBLICAR CRÓNICA DE JACK";
                btn.style.backgroundColor = "var(--jack-accent)";
                btn.disabled = true; 
                validarJack();
            } else {
                document.getElementById('areaFinanzas1').style.display = 'block';
                document.getElementById('areaFinanzas2').style.display = 'block';
                btn.innerText = "🚀 LIQUIDAR CAJA (DOMINGO)";
                btn.style.backgroundColor = "var(--gold-accent)";
                btn.disabled = false;
            }
        }

        function validarJack() {
            const mes = document.getElementById('mesFecha').value;
            if (!historialFechas.includes(mes + "-" + anioActual)) return; 
            const bardo = document.getElementById('jackBardo').value;
            const manos = document.getElementById('jackManos').value;
            const btn = document.getElementById('btnLiquidar');
            const valido = (bardo.length > 15 && manos.length > 15) && !/^(.)\1+$/.test(bardo);
            btn.disabled = !valido;
        }

        function renderizarMatriz() {
            const area = document.getElementById('checkinArea'); area.innerHTML = '';
            todosLosJugadores.forEach(j => {
                matrizJugadores[j] = { presente: false, t1: true, t2: true, comida: true, bebida: true };
                let sId = j.replace(/\s+/g, '_');
                area.innerHTML += `<div class="player-row"><label class="checkbox-item"><input type="checkbox" id="chk_${sId}" onchange="toggleP('${j}', '${sId}')"> ${j}</label><div class="matrix-toggles" id="toggles_${sId}" style="display:none;"><button type="button" class="toggle-btn active" id="btn_t1_${sId}" onclick="toggleO('${j}', '${sId}', 't1')">🏆 T1</button><button type="button" class="toggle-btn active" id="btn_t2_${sId}" onclick="toggleO('${j}', '${sId}', 't2')">🏆 T2</button><button type="button" class="toggle-btn active" id="btn_comida_${sId}" onclick="toggleO('${j}', '${sId}', 'comida')">🥩 Comida</button><button type="button" class="toggle-btn active" id="btn_bebida_${sId}" onclick="toggleO('${j}', '${sId}', 'bebida')">🍻 Bebida</button></div></div>`;
            });
        }
        function toggleP(n, sId) { matrizJugadores[n].presente = document.getElementById(`chk_${sId}`).checked; document.getElementById(`toggles_${sId}`).style.display = matrizJugadores[n].presente ? 'flex' : 'none'; act(); }
        function toggleO(n, sId, o) { matrizJugadores[n][o] = !matrizJugadores[n][o]; document.getElementById(`btn_${o}_${sId}`).classList.toggle('active', matrizJugadores[n][o]); act(); }
        function act() { document.getElementById('gastosContainer').innerHTML = ''; gastoCount = 0; if(Object.keys(matrizJugadores).some(j=>matrizJugadores[j].presente)) agregarGasto(); poblarTorneos(); }

        function agregarGasto() {
            gastoCount++;
            let opts = '<option value="">Quién...</option>'; Object.keys(matrizJugadores).filter(j=>matrizJugadores[j].presente).forEach(j => opts += `<option value="${j}">${j}</option>`);
            document.getElementById('gastosContainer').insertAdjacentHTML('beforeend', `<div class="gasto-row" id="gasto${gastoCount}"><select class="pagador">${opts}</select><input type="number" class="monto" placeholder="Monto ($)"><select class="concepto"><option value="Comida">🥩 Comida</option><option value="Bebida">🍻 Bebida</option><option value="Varios">📦 Varios</option></select></div>`);
        }

        function poblarTorneos() {
            const jugT1 = Object.keys(matrizJugadores).filter(j => matrizJugadores[j].presente && matrizJugadores[j].t1);
            const jugT2 = Object.keys(matrizJugadores).filter(j => matrizJugadores[j].presente && matrizJugadores[j].t2);
            let oT1 = '<option value="">Jugador...</option>'; jugT1.forEach(j => oT1 += `<option value="${j}">${j}</option>`);
            let oT2 = '<option value="">Jugador...</option>'; jugT2.forEach(j => oT2 += `<option value="${j}">${j}</option>`);
            document.getElementById('torneo1').innerHTML = ''; document.getElementById('torneo2').innerHTML = '';
            for(let i=1; i<=jugT1.length; i++) document.getElementById('torneo1').innerHTML += `<select id="t1_pos${i}">${oT1}</select>`;
            for(let i=1; i<=jugT2.length; i++) document.getElementById('torneo2').innerHTML += `<select id="t2_pos${i}">${oT2}</select>`;
        }

        function enviarDatos() {
            const mes = document.getElementById('mesFecha').value;
            if(!mes) { alert("Elegí un mes."); return; }

            const yaJugado = historialFechas.includes(mes + "-" + anioActual);
            const modoActual = yaJugado ? "prensa" : "liquidar";
            const btn = document.getElementById('btnLiquidar');
            
            let data = { 
                modo: modoActual, mes: mes, nroFecha: anioActual,
                cronicaJack: { lugar: document.getElementById('jackLugar').value, comida: document.getElementById('jackComida').value, bebida: document.getElementById('jackBebida').value, manos: document.getElementById('jackManos').value, bardo: document.getElementById('jackBardo').value }
            };

            if (modoActual === "liquidar") {
                const presentes = Object.keys(matrizJugadores).filter(j => matrizJugadores[j].presente);
                if(presentes.length === 0) { alert("Tildá al menos a un jugador en la Matriz."); return; }
                
                data.tipoTorneo = document.getElementById('tipoTorneo').value;
                data.buyIn = document.getElementById('valorBuyIn').value;
                data.matriz = matrizJugadores;
                data.gastos = [];
                for(let i=1; i<=gastoCount; i++) {
                    const row = document.getElementById(`gasto${i}`);
                    if(row) {
                        const pagador = row.querySelector('.pagador').value, monto = row.querySelector('.monto').value, concepto = row.querySelector('.concepto').value;
                        if(pagador && monto) data.gastos.push({ pagador, monto, concepto });
                    }
                }
                data.torneo1 = {}; data.torneo2 = {};
                const jugT1 = presentes.filter(j => matrizJugadores[j].t1);
                const jugT2 = presentes.filter(j => matrizJugadores[j].t2);
                for(let i=1; i<=jugT1.length; i++) data.torneo1[`pos${i}`] = document.getElementById(`t1_pos${i}`).value || "";
                for(let i=1; i<=jugT2.length; i++) data.torneo2[`pos${i}`] = document.getElementById(`t2_pos${i}`).value || "";
                
                btn.innerText = "⏳ PROCESANDO CAJA...";
            } else {
                btn.innerText = "⏳ REDACTANDO CRÓNICA...";
            }

            btn.disabled = true;
            const formData = new FormData();
            formData.append("token", MI_TOKEN_SECRETO); formData.append("datos", JSON.stringify(data));

            fetch(googleWebhookUrl, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => {
                btn.innerText = modoActual === "liquidar" ? "✅ CAJA LIQUIDADA" : "✅ NOTA PUBLICADA"; 
                btn.style.backgroundColor = "#4CAF50"; btn.style.color = "white";
                setTimeout(() => { if(tg) tg.close(); }, 2500);
            }).catch(error => { 
                alert("❌ Error de red."); 
                btn.innerText = "REINTENTAR"; 
                btn.disabled = false;
            });
        }

        window.onload = cargarPadron;
    </script>
</body>
</html>
