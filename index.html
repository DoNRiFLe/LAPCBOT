<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paño LAPC</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg-color: #1a1a1a; --card-bg: #224a2e; --text-color: #ffffff; --gold-accent: #d4af37; --input-bg: #2d2d2d; --jack-accent: #3a7bd5; }
        
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; background-color: var(--bg-color); color: var(--text-color); margin: 0; }
        h2 { text-align: center; color: var(--gold-accent); letter-spacing: 2px; margin-bottom: 5px; }
        .crown-rank { text-align: center; font-size: 13px; color: var(--gold-accent); margin-bottom: 20px; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .section-card { background-color: var(--card-bg); border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #32613f; }
        .section-jack { border-color: var(--jack-accent); background-color: #1e2a3a; }
        h3 { border-bottom: 1px solid var(--gold-accent); padding-bottom: 8px; color: var(--gold-accent); margin-top: 0;}
        .section-jack h3 { color: var(--jack-accent); border-color: var(--jack-accent); }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 14px; color: #e0e0e0; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #444; background-color: var(--input-bg); color: white; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; min-height: 60px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .checkbox-item { background: #111; padding: 8px 12px; border-radius: 20px; border: 1px solid #444; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .checkbox-item input { width: auto; margin: 0; }
        button { width: 100%; padding: 15px; margin-top: 10px; background-color: var(--gold-accent); color: #111; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-gasto { background-color: #32613f; color: white; margin-bottom: 15px; border: 1px dashed var(--gold-accent); }
        .gasto-row { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .btn-ranking-link { 
            display: block; 
            text-decoration: none; 
            background: linear-gradient(90deg, #111, #224a2e, #111); 
            border: 1px solid var(--gold-accent); 
            border-radius: 8px; 
            padding: 12px; 
            margin-bottom: 20px; 
            color: var(--gold-accent); 
            text-transform: uppercase; 
            font-weight: bold; 
            text-align: center; 
            letter-spacing: 1px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            transition: all 0.2s ease; 
        }
        .btn-ranking-link:active { 
            transform: scale(0.98); 
            background: var(--gold-accent); 
            color: #111; 
        }
    </style>
</head>
<body>
    <h2>♠️ LAPC ♣️</h2> 
    <a href="ranking.html" class="btn-ranking-link">         👑 VER LEADERBOARD OFICIAL 👑    </a>

    <div class="section-card">
        <h3>📍 Check-in de Jugadores</h3>
        <div class="checkbox-group" id="checkinArea">⏳ Conectando con el Padrón...</div>
    </div>
    
    <div class="section-card">
        <h3>📅 Datos de la Jornada</h3>
        <label>Mes de la Fecha</label>
        <select id="mesFecha">
            <option value="">⏳ Evaluando fechas disponibles...</option>
        </select>
        
        <label>Tipo de Torneo</label>
        <select id="tipoTorneo">
            <option value="Slam">Slam (Puntos 100%)</option>
            <option value="GrandSlam">Grand Slam (Puntos 150%)</option>
        </select>
    </div>

    <div class="section-card section-jack">
        <h3>🎙️ Memorias de Jack Rivers</h3>
        <label>🏠 Sede / Lugar</label>
        <input type="text" id="jackLugar" placeholder="Ej: Rifle House, Casa de Marley...">
        
        <label>🥩 El Menú (Asador y Salsas)</label>
        <textarea id="jackComida" placeholder="Ej: Bondiola de Nico con cebollas encurtidas..."></textarea>
        
        <label>🍻 Hidratación (Bebidas)</label>
        <input type="text" id="jackBebida" placeholder="Ej: IPA helada, Fernet negro, Whisky..."></textarea>

        <label>🃏 Manos Increíbles (Cartas y protagonistas)</label>
        <textarea id="jackManos" placeholder="Ej: Daro color al As sepulta a Sólido..."></textarea>

        <label>🔥 El Bardo / Momentos (Lo insólito de la fecha)</label>
        <textarea id="jackBardo" placeholder="Ej: Salidas a comprar puchos, el Fichazo Gate, beodos elegantes..."></textarea>
    </div>
    
    <div class="section-card">
        <h3>💰 Configuración de la Fecha</h3>
        <label>Valor de la Entrada (Buy-in por Torneo)</label>
        <input type="number" id="valorBuyIn" value="6000" style="font-weight: bold; color: var(--gold-accent);">
    </div>

    <div class="section-card">
        <h3>💸 La Caja (Gastos)</h3>
        <div id="gastosContainer"></div>
        <button class="btn-gasto" onclick="agregarGasto()">➕ Agregar Gasto</button>
    </div>

    <div class="section-card">
        <h3>🏆 Torneo 1</h3>
        <div id="torneo1"></div>
    </div>

    <div class="section-card">
        <h3>🏆 Torneo 2</h3>
        <div id="torneo2"></div>
    </div>

    <button id="btnLiquidar" onclick="enviarDatos()">🚀 LIQUIDAR Y GENERAR CRÓNICA</button>

    <script>
        let tg;
        try { 
            tg = window.Telegram.WebApp; 
            tg.expand(); 
            const idPermitido = 1149173434; 
            const usuarioActual = tg.initDataUnsafe?.user?.id;
            if (usuarioActual && usuarioActual !== idPermitido) {
                document.body.innerHTML = `<div style="text-align: center; margin-top: 50px;"><h1 style="color: #ff4444; font-size: 50px;">⛔</h1><h2 style="color: #ff4444;">ACCESO DENEGADO</h2></div>`;
                setTimeout(() => { tg.close(); }, 3000);
                throw new Error("Intruso detectado");
            }
        } catch(e) { console.log("Modo navegador o error de seguridad."); }

        // 🚨 MODO A CARA DESCUBIERTA: PEGAR LINK ACÁ ADENTRO DE LAS COMILLAS 🚨
        const googleWebhookUrl = "https://script.google.com/macros/s/AKfycbzaxfJJyLgAchlTBPrgM4GRfwSHmQyl3_UtU_FIi0Pt29ZjyLeW4uEfhLdopDBJkZAd/exec"; 
        
        const MI_TOKEN_SECRETO = "LAPC_2026_PRO_SECRET";
        
        let todosLosJugadores = [];
        let jugadoresPresentes = [];
        let gastoCount = 0;
        let historialFechas = []; 
        const anioActual = new Date().getFullYear(); 

        async function cargarPadron() {
            try {
                let response = await fetch(googleWebhookUrl + "?token=" + MI_TOKEN_SECRETO);
                let data = await response.json();
                
                if (data.error) {
                    document.getElementById('checkinArea').innerHTML = `❌ ${data.error}`;
                    document.getElementById('mesFecha').innerHTML = `<option value="">❌ Error</option>`;
                    return;
                }
                
                todosLosJugadores = data.jugadores || [];
                historialFechas = data.fechasJugadas || []; 
                renderizarCheckboxes();
                renderizarMesesPredictivos(); 
            } catch (error) {
                document.getElementById('checkinArea').innerHTML = "❌ Error conectando con la base financiera.";
            }
        }

        function renderizarMesesPredictivos() {
            const selectMes = document.getElementById('mesFecha');
            selectMes.innerHTML = '';
            const todosLosMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

            const mesesDisponibles = todosLosMeses.filter(mes => {
                const idBuscado = mes + "-" + anioActual; 
                const idPruebaVieja = mes + "-1";         
                const idPruebaVieja2 = mes + "-2";        
                return !historialFechas.includes(idBuscado) && !historialFechas.includes(idPruebaVieja) && !historialFechas.includes(idPruebaVieja2);
            });

            if (mesesDisponibles.length === 0) {
                selectMes.innerHTML = '<option value="">🏆 TEMPORADA COMPLETADA</option>';
                const btn = document.getElementById('btnLiquidar');
                btn.disabled = true;
                btn.innerText = "⛔ AÑO CERRADO";
                btn.style.backgroundColor = "#555";
            } else {
                mesesDisponibles.forEach(mes => {
                    selectMes.innerHTML += `<option value="${mes}">${mes}</option>`;
                });
            }
        }

        function renderizarCheckboxes() {
            const checkinArea = document.getElementById('checkinArea');
            checkinArea.innerHTML = '';
            todosLosJugadores.forEach(j => {
                checkinArea.innerHTML += `<label class="checkbox-item"><input type="checkbox" value="${j}" onchange="actualizarPresentes()"> ${j}</label>`;
            });
        }

        function actualizarPresentes() {
            const checkboxes = document.querySelectorAll('#checkinArea input:checked');
            jugadoresPresentes = Array.from(checkboxes).map(cb => cb.value);
            document.getElementById('gastosContainer').innerHTML = '';
            gastoCount = 0;
            if (jugadoresPresentes.length > 0) { agregarGasto(); }
            poblarTorneos();
        }

        function agregarGasto() {
            gastoCount++;
            let options = '<option value="">Seleccionar...</option>';
            jugadoresPresentes.forEach(j => options += `<option value="${j}">${j}</option>`);
            const html = `
                <div class="gasto-row" id="gasto${gastoCount}">
                    <label>¿Quién pagó?</label><select class="pagador">${options}</select>
                    <label>Monto ($)</label><input type="number" class="monto" placeholder="Ej: 15000">
                    <label>Concepto</label>
                    <select class="concepto"><option value="Asado">🥩 Asado</option><option value="Bebida">🍻 Bebida</option><option value="Hielo">🧊 Hielo</option><option value="Varios">📦 Varios</option></select>
                </div>`;
            document.getElementById('gastosContainer').insertAdjacentHTML('beforeend', html);
        }

        function poblarTorneos() {
            const medallas = ["🥇 1º", "🥈 2º", "🥉 3º", "🏅 4º", "💀 5º", "💀 6º", "💀 7º", "💀 8º", "💀 9º", "💀 10º"];
            let options = '<option value="">Seleccionar...</option>';
            jugadoresPresentes.forEach(j => options += `<option value="${j}">${j}</option>`);
            document.getElementById('torneo1').innerHTML = '';
            document.getElementById('torneo2').innerHTML = '';
            let cantidad = jugadoresPresentes.length;
            for(let i=1; i<=cantidad; i++) {
                let medalla = medallas[i-1] || `💀 ${i}º`;
                document.getElementById('torneo1').innerHTML += `<label>${medalla} Puesto</label><select id="t1_pos${i}" onchange="validarUnicos('t1', ${cantidad})">${options}</select>`;
                document.getElementById('torneo2').innerHTML += `<label>${medalla} Puesto</label><select id="t2_pos${i}" onchange="validarUnicos('t2', ${cantidad})">${options}</select>`;
            }
        }

        function validarUnicos(torneo, cantidad) {
            let seleccionados = [];
            for(let i=1; i<=cantidad; i++) {
                let val = document.getElementById(`${torneo}_pos${i}`).value;
                if(val) seleccionados.push(val);
            }
            for(let i=1; i<=cantidad; i++) {
                let select = document.getElementById(`${torneo}_pos${i}`);
                let currentVal = select.value;
                Array.from(select.options).forEach(opt => {
                    if(opt.value !== "" && opt.value !== currentVal && seleccionados.includes(opt.value)) { opt.disabled = true; } 
                    else { opt.disabled = false; }
                });
            }
        }

        function enviarDatos() {
            if(jugadoresPresentes.length === 0) {
                alert("Primero tenés que tildar quiénes jugaron.");
                return;
            }

            const mesIngresado = document.getElementById('mesFecha').value;
            if(!mesIngresado) {
                alert("No hay un mes válido para liquidar.");
                return;
            }

            const idActual = mesIngresado + "-" + anioActual;
            if (historialFechas.includes(idActual)) {
                alert(`⚠️ ALTO AHÍ: El torneo de "${mesIngresado} ${anioActual}" ya está liquidado.`);
                return; 
            }

            const btn = document.getElementById('btnLiquidar');
            btn.innerText = "⏳ PROCESANDO...";
            btn.disabled = true;
            
            const data = { 
                mes: mesIngresado,
                nroFecha: anioActual, 
                tipoTorneo: document.getElementById('tipoTorneo').value,
                cantidadPresentes: jugadoresPresentes.length,
                buyIn: document.getElementById('valorBuyIn').value,
                // DATOS EXCLUSIVOS PARA JACK RIVERS
                cronicaJack: {
                    lugar: document.getElementById('jackLugar').value,
                    comida: document.getElementById('jackComida').value,
                    bebida: document.getElementById('jackBebida').value,
                    manos: document.getElementById('jackManos').value,
                    bardo: document.getElementById('jackBardo').value
                },
                gastos: [], torneo1: {}, torneo2: {} 
            };

            for(let i=1; i<=gastoCount; i++) {
                const row = document.getElementById(`gasto${i}`);
                if(row) {
                    const pagador = row.querySelector('.pagador').value;
                    const monto = row.querySelector('.monto').value;
                    const concepto = row.querySelector('.concepto').value;
                    if(pagador && monto) data.gastos.push({ pagador, monto, concepto });
                }
            }
            for(let i=1; i<=jugadoresPresentes.length; i++) {
                data.torneo1[`pos${i}`] = document.getElementById(`t1_pos${i}`).value || "";
                data.torneo2[`pos${i}`] = document.getElementById(`t2_pos${i}`).value || "";
            }

            const formData = new FormData();
            formData.append("token", MI_TOKEN_SECRETO);
            formData.append("datos", JSON.stringify(data));

            fetch(googleWebhookUrl, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => {
                alert("🚀 ¡FECHA LIQUIDADA EN EL EXCEL!\n\nRevisá tu chat privado, Jack Rivers ya tiene la data para prender fuego todo.");
                btn.innerText = "🚀 LIQUIDAR Y GENERAR CRÓNICA";
                btn.disabled = false;
                if(tg) { tg.close(); }
            }).catch(error => { 
                alert("❌ Error de conexión. Revisá que tengas internet."); 
                btn.innerText = "🚀 LIQUIDAR Y GENERAR CRÓNICA";
                btn.disabled = false;
            });
        }

        window.onload = cargarPadron;
    </script>
</body>
</html>
